<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC 233 乐园 - mygamehover 项目提取</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===============================
       卡片 1 - 打工生活模拟器
  ================================ -->
  <article class="card">
    <div class="card-outline"></div>

    <div class="ambient-sys">
      <img src="https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=600&auto=format&fit=crop" alt="bg">
      <div class="overlay"></div>
    </div>

    <div class="card-content">
      <div class="img-container">
        <img src="https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=600&auto=format&fit=crop" alt="cover" class="cover-img">
      </div>
      
      <div class="bottom-container">
        <div class="text-title">打工生活模拟器</div>
        <div class="info-row">
          <div class="text-time"><svg class="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>10小时前玩过</div>
          <div class="dynamic-right">
            <div class="text-value">100.9h</div>
            <button class="btn-primary">启动</button>
          </div>
        </div>
      </div>
    </div>
  </article>

  <!-- ===============================
       卡片 2 - 梦境护卫队
  ================================ -->
  <article class="card">
    <div class="card-outline"></div>

    <div class="ambient-sys">
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600&auto=format&fit=crop" alt="bg">
      <div class="overlay"></div>
    </div>

    <div class="card-content">
      <div class="img-container">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600&auto=format&fit=crop" alt="cover" class="cover-img">
      </div>
      
      <div class="bottom-container">
        <div class="text-title">梦境护卫队-注册送300乐币</div>
        <div class="info-row">
          <div class="text-time"><svg class="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>10小时前玩过</div>
          <div class="dynamic-right">
            <div class="text-value">100.9h</div>
            <button class="btn-primary">启动</button>
          </div>
        </div>
      </div>
    </div>
  </article>

</body>
</html>
